location: East US 2
name: pivot-frontend
resourceGroup: rg-pivot-app
type: Microsoft.App/containerApps
properties:
  configuration:
    ingress:
      external: true
      targetPort: 80
      allowInsecure: false
      traffic:
        - latestRevision: true
          weight: 100
  template:
    containers:
      - name: pivot-frontend
        image: ghcr.io/eduardo-gms/pivot-frontend:latest
        env:
          - name: BACKEND_URL
            value: "http://pivot-backend.internal.whitecliff-325dad00.eastus2.azurecontainerapps.io"
    scale:
      minReplicas: 0
      maxReplicas: 1
