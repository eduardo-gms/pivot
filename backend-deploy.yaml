location: East US 2
name: pivot-backend
resourceGroup: rg-pivot-app
type: Microsoft.App/containerApps
properties:
  configuration:
    secrets:
      # Os segredos reais são injetados pelo GitHub Actions via 'az containerapp secret set'.
      # Estes valores no YAML servem apenas de placeholder estrutural.
      - name: database-url
        value: "<gerado-pelo-ci>"
      - name: direct-url
        value: "<gerado-pelo-ci>"
    ingress:
      external: true
      targetPort: 3000
      allowInsecure: false
      traffic:
        - latestRevision: true
          weight: 100
  template:
    containers:
      - name: pivot-backend
        image: ghcr.io/eduardo-gms/pivot-backend:latest
        command:
          - sh
        args:
          - "-c"
          - "npx prisma migrate deploy && npm run start:prod"
        env:
          - name: DATABASE_URL
            secretRef: database-url
          - name: DIRECT_URL
            secretRef: direct-url
          - name: PORT
            value: "3000"
          - name: CORS_ORIGIN
            value: "https://pivot-frontend.whitecliff-325dad00.eastus2.azurecontainerapps.io"
    scale:
      minReplicas: 0
      maxReplicas: 1
