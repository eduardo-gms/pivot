location: East US 2
name: pivot-backend
resourceGroup: rg-pivot-app
type: Microsoft.App/containerApps
properties:
  configuration:
    secrets:
      # O segredo real (database-url) é injetado pelo GitHub Actions via 'az containerapp secret set'.
      # Este valor no YAML serve apenas de placeholder estrutural.
      - name: database-url
        value: "<gerado-pelo-ci>"
    ingress:
      external: false
      targetPort: 3000
      allowInsecure: false
      traffic:
        - latestRevision: true
          weight: 100
  template:
    containers:
      - name: pivot-backend
        image: ghcr.io/eduardo-gms/pivot-backend:latest
        command:
          - sh
        args:
          - "-c"
          - "npx prisma migrate deploy && npm run start:prod"
        env:
          - name: DATABASE_URL
            secretRef: database-url
          - name: PORT
            value: "3000"
    scale:
      minReplicas: 0
      maxReplicas: 1
