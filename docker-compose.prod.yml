version: '3.8'

services:
  backend:
    image: ghcr.io/eduardo-gms/pivot-backend:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: "*"
      PORT: 3000
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:prod"

  frontend:
    image: ghcr.io/eduardo-gms/pivot-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
