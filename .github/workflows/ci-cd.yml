name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  RESOURCE_GROUP: rg-pivot-app
  ACA_ENVIRONMENT: env-pivot-prod
  BACKEND_APP: pivot-backend
  FRONTEND_APP: pivot-frontend

jobs:
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    name: Build Backend (NestJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name != 'pull_request'

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend (create or update)
        uses: azure/cli@v2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          azcliversion: latest
          inlineScript: |
            BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
            ENV_ID=$(az containerapp env show -n ${{ env.ACA_ENVIRONMENT }} -g ${{ env.RESOURCE_GROUP }} --query id -o tsv)

            if az containerapp show \
                --name ${{ env.BACKEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --output none 2>/dev/null; then

              echo ">>> Backend existe — atualizando..."
              az containerapp secret set \
                --name ${{ env.BACKEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --secrets "database-url=$DATABASE_URL"

              az containerapp update \
                --name ${{ env.BACKEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image "$BACKEND_IMAGE" \
                --min-replicas 1 \
                --max-replicas 1 \
                --set-env-vars \
                  "DATABASE_URL=secretref:database-url" \
                  "PORT=3000" \
                  "CORS_ORIGIN=${{ vars.FRONTEND_URL }}"
            else
              echo ">>> Backend nao existe — criando..."
              az containerapp create \
                --name ${{ env.BACKEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --environment "$ENV_ID" \
                --image "$BACKEND_IMAGE" \
                --target-port 3000 \
                --ingress internal \
                --min-replicas 1 \
                --max-replicas 1 \
                --liveness-probe-path /api/health \
                --readiness-probe-path /api/health \
                --secrets "database-url=$DATABASE_URL" \
                --env-vars \
                  "DATABASE_URL=secretref:database-url" \
                  "PORT=3000" \
                  "CORS_ORIGIN=${{ vars.FRONTEND_URL }}"
            fi

      - name: Deploy Frontend (create or update)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest"
            ENV_ID=$(az containerapp env show -n ${{ env.ACA_ENVIRONMENT }} -g ${{ env.RESOURCE_GROUP }} --query id -o tsv)

            if az containerapp show \
                --name ${{ env.FRONTEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --output none 2>/dev/null; then

              echo ">>> Frontend existe — atualizando..."
              az containerapp update \
                --name ${{ env.FRONTEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image "$FRONTEND_IMAGE" \
                --min-replicas 1 \
                --max-replicas 1 \
                --set-env-vars "BACKEND_URL=http://pivot-backend"
            else
              echo ">>> Frontend nao existe — criando..."
              az containerapp create \
                --name ${{ env.FRONTEND_APP }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --environment "$ENV_ID" \
                --image "$FRONTEND_IMAGE" \
                --target-port 80 \
                --ingress external \
                --min-replicas 1 \
                --max-replicas 1 \
                --env-vars "BACKEND_URL=http://pivot-backend"
            fi